---
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Build
        run: make -B build
      - name: Plugin Test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          ./.github/scripts/ci.sh 2>&1 | tee integration_output.txt
      - name: Verify test output
        run: |
          # Keep the workflow aligned with the code-level compatibility contract.
          expected_count=$(go run ./cmd/list-supported-catalogs | wc -l | tr -d ' ')
          actual_count=$(grep -c '^COMPAT_CONFIG_OK ' integration_output.txt)
          test "$actual_count" -eq "$expected_count"
